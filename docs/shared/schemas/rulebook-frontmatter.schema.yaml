$schema: "https://json-schema.org/draft/2020-12/schema"
title: Rulebook Front Matter
type: object
unevaluatedProperties: false
allOf:
  - $ref: "./common-frontmatter.schema.yaml"
  - type: object
    properties:
      type:
        type: string
        enum:
          - rulebook
          - meta
        description: "ドキュメント種別（rulebook または meta）"
      target_format:
        type: string
        enum:
          - yaml
          - json
          - markdown
        description: "ルールの対象となるドキュメントのフォーマット"
