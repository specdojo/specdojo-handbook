# wbs.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://specdojo.org/schemas/wbs/v1"
$title: "SpecDojo WBS (domain) schema"
$type: object
$comment: >
  Schema for domain-scoped WBS SSOT files:
  docs/ja/projects/<project_id>/020-project-scope/040-wbs/wbs-<domain>.yaml WBS
  is scope baseline: deliverables + done criteria. No schedule fields here.
  Domain is the stable ownership boundary; assigned_team is optional and may
  change over time. This schema models leaf-level deliverable-driven WBS items
  intended to bridge Deliverables -> WBS -> Schedule -> Execution.

additionalProperties: false

required:
  - id
  - type
  - status
  - project_id
  - domain
  - wbs

properties:
  id:
    type: string
    minLength: 1
    description: "Document metadata ID (frontmatter-compatible). Required."
    pattern: "^[a-z0-9][a-z0-9-]*$"

  type:
    type: string
    description: "Document metadata type. Must be 'wbs'. Required."
    enum: [ "wbs" ]

  status:
    type: string
    description: "Document metadata status (frontmatter-compatible). Required."
    enum: [ "draft", "ready", "deprecated" ]

  part_of:
    type: array
    description: "Optional parent document IDs (frontmatter-compatible)."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  based_on:
    type: array
    description: "Optional basis document IDs (frontmatter-compatible)."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  supersedes:
    type: array
    description: "Optional superseded document IDs (frontmatter-compatible)."
    items:
      $ref: "#/$defs/DocId"
    uniqueItems: true

  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."

  domain:
    type: string
    minLength: 1
    description: "Stable ownership boundary used in file name wbs-<domain>.yaml
      (e.g., auth, billing, infra)."
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  assigned_team:
    type: string
    description: >
      Optional current team/org label responsible for this domain (may change).
      Keep for readability/reporting; do not use as a stable key.
    pattern: "^[^\\s].{0,127}$"

  wbs:
    type: array
    minItems: 1
    description: "List of leaf-level WBS elements under this domain."
    items:
      $ref: "#/$defs/WbsItem"

$defs:
  DocId:
    type: string
    minLength: 1
    description: "Frontmatter-compatible document ID."
    pattern: "^[a-z0-9][a-z0-9-]*$"

  Owner:
    type: string
    description: "Document owner role. PO=Project Owner, BA=Business Analyst,
      ARC=Architect, QE=Quality Engineer."
    enum: [ "PO", "BA", "ARC", "QE" ]

  Deliverable:
    type: object
    additionalProperties: false
    required:
      - path
      - kind
    properties:
      path:
        type: string
        minLength: 1
        description: >
          Repository path to deliverable. Prefer
          product-docs/project-docs/src/tests/infra or other SSOT locations in
          the repository.
        pattern: "^(.+/)?[^\\s]+$"
      kind:
        type: string
        description: >
          Intended relationship of this WBS item to the deliverable. create: new
          file/artifact modify: existing file/artifact to change reference:
          referenced artifact, not directly changed by this WBS item
        enum: [ "create", "modify", "reference" ]
      note:
        type: string
        description: "Optional note about the deliverable."

  RefId:
    type: string
    minLength: 1
    description: >
      Cross-reference identifier to acceptance criteria, specs, tests,
      decisions, etc. Examples: BAC-AUTH-010, SAC-AUTH-020, DEC-0007.
    pattern: "^[A-Z][A-Z0-9-]{1,127}$"

  WbsItem:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - owner
      - deliverables
      - done_criteria
    properties:
      id:
        type: string
        minLength: 1
        description: >
          Globally unique WBS ID. Recommended format: WBS-<DOMAIN>-<NNN>, e.g.
          WBS-AUTH-010.
        pattern: "^WBS-[A-Z0-9-]+-[0-9]{2,4}$"

      name:
        type: string
        minLength: 1
        description: "Leaf-level WBS element name. Prefer verb-led, concrete names."

      description:
        type: string
        minLength: 1
        description: >
          Optional scope description for this WBS element. Use for concise
          explanation of what is in scope for this item; do not duplicate done
          criteria or free-form notes.

      owner:
        $ref: "#/$defs/Owner"

      component:
        type: string
        description: >
          Optional stable sub-area/component within the domain. Useful when
          deriving schedule files or grouping execution work (e.g., api, ui, db,
          batch).
        pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

      deliverables:
        type: array
        minItems: 1
        description: "Deliverables produced, modified, or referenced by this WBS element."
        items:
          $ref: "#/$defs/Deliverable"

      done_criteria:
        type: string
        minLength: 1
        description: >
          Completion / acceptance criteria for this WBS element. Scope-focused,
          not schedule-focused.

      acceptance_refs:
        type: array
        description: >
          Optional references to formal acceptance criteria / specs / decisions
          that ground the done criteria.
        items:
          $ref: "#/$defs/RefId"
        uniqueItems: true

      tags:
        type: array
        description: "Optional tags for filtering/grouping."
        items:
          type: string
          minLength: 1
        uniqueItems: true

      notes:
        type: string
        description: "Optional free-form notes. Keep concise; avoid duplicating SSOT
          content."
