# sch-config.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule track config schema"
type: object
additionalProperties: false

required:
  - kind
  - version
  - project_id
  - track
  - settings

properties:
  kind:
    const: "config"
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."
  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."
  track:
    $ref: "./sch-common.schema.yaml#/$defs/Track"
  assigned_team:
    $ref: "./sch-common.schema.yaml#/$defs/AssignedTeam"
  default_agent_mode:
    $ref: "./sch-common.schema.yaml#/$defs/AgentMode"
  settings:
    $ref: "./sch-common.schema.yaml#/$defs/SettingsOverride"
  notes:
    type: string
    description: "Optional file-level notes."
