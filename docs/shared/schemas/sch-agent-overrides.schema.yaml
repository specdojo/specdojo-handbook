# sch-agent-overrides.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule agent overrides schema"
type: object
additionalProperties: false

required:
  - kind
  - version
  - project_id
  - task_overrides

properties:
  kind:
    const: "agent_overrides"
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."
  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."
  track:
    $ref: "./sch-common.schema.yaml#/$defs/Track"
  default_agent_mode:
    $ref: "./sch-common.schema.yaml#/$defs/AgentMode"
  task_overrides:
    type: array
    minItems: 1
    items:
      $ref: "./sch-common.schema.yaml#/$defs/AgentTaskOverride"
  notes:
    type: string
    description: "Optional file-level notes."
