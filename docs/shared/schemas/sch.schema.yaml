# sch.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Schedule schema (level-discriminated)"
$type: object
$comment: >
  Schema for schedule SSOT files.
  File name is NOT used to infer domain/container.
  Instead, schedule_level discriminates required fields:
    - milestones: organization-wide milestone plan
    - domain: domain-level summary plan
    - container: container/component-level detailed plan

additionalProperties: false

required:
  - version
  - project_id
  - schedule_level
  - settings

properties:
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."

  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-sdh-ja-0001)."

  schedule_level:
    type: string
    description: "Schedule granularity level."
    enum: ["milestones", "domain", "container"]

  domain:
    type: string
    description: >
      Stable ownership boundary (required for domain/container schedules).
      Not inferred from file name.
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  container:
    type: string
    description: >
      Sub-scope inside a domain (required for container schedules).
      Use a stable slug (service/component/module).
    pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

  assigned_team:
    type: string
    description: >
      Optional current team/org label (may change). For readability/reporting only.
    pattern: '^[^\s].{0,127}$'

  calendar:
    $ref: "#/$defs/CalendarOverride"

  settings:
    $ref: "#/$defs/SettingsOverride"

  tasks:
    type: array
    description: "Scheduled tasks (duration-based)."
    items:
      $ref: "#/$defs/Task"

  milestones:
    type: array
    description: "Milestones (duration=0) typically representing gates/approvals."
    items:
      $ref: "#/$defs/Milestone"

oneOf:
  - $ref: "#/$defs/MilestonesLevel"
  - $ref: "#/$defs/DomainLevel"
  - $ref: "#/$defs/ContainerLevel"

$defs:
  Owner:
    type: string
    description: "Document owner role. PO=Project Owner, BA=Business Analyst, ARC=Architect, QE=Quality Engineer."
    enum: ["PO", "BA", "ARC", "QE"]

  Id:
    type: string
    minLength: 1
    description: >
      Globally unique identifier across all schedule files in the project.
      Recommended examples:
        - T-AUTH-API-010
        - M-RELEASE-010
    pattern: "^[A-Za-z0-9][A-Za-z0-9_-]{1,63}$"

  Date:
    type: string
    format: date
    description: "ISO date (YYYY-MM-DD)."

  Weekday:
    type: string
    enum: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]

  Calendar:
    type: object
    additionalProperties: false
    required:
      - timezone
      - workdays
    properties:
      timezone:
        type: string
        minLength: 1
        description: "IANA timezone name (e.g., Asia/Tokyo)."
      work_hours_per_day:
        type: number
        exclusiveMinimum: 0
        maximum: 24
        description: "Working hours represented by one schedule day."
      workdays:
        type: array
        minItems: 1
        uniqueItems: true
        description: "Working weekdays."
        items:
          $ref: "#/$defs/Weekday"
      holidays:
        type: array
        description: "Optional holiday dates excluded from workdays."
        items:
          $ref: "#/$defs/Date"

  CalendarOverride:
    type: object
    additionalProperties: false
    properties:
      timezone:
        type: string
        minLength: 1
        description: "Optional timezone override."
      work_hours_per_day:
        type: number
        exclusiveMinimum: 0
        maximum: 24
        description: "Optional working-hours-per-day override."
      workdays:
        type: array
        minItems: 1
        uniqueItems: true
        description: "Optional workday override."
        items:
          $ref: "#/$defs/Weekday"
      holidays:
        type: array
        description: "Optional additional holiday dates."
        items:
          $ref: "#/$defs/Date"

  Settings:
    type: object
    additionalProperties: false
    required:
      - start_date
    properties:
      start_date:
        $ref: "#/$defs/Date"
      finish_milestone_id:
        $ref: "#/$defs/Id"
      notes:
        type: string
        description: "Optional schedule-wide notes."

  SettingsOverride:
    type: object
    additionalProperties: false
    properties:
      start_date:
        $ref: "#/$defs/Date"
      finish_milestone_id:
        $ref: "#/$defs/Id"
      notes:
        type: string
        description: "Optional schedule-wide notes."

  DependencyIds:
    type: array
    description: >
      List of predecessor IDs. These IDs may refer to tasks or milestones in any schedule file.
      The merged graph is validated by tooling (existence, no cycles).
    items:
      $ref: "#/$defs/Id"
    uniqueItems: true

  Task:
    type: object
    additionalProperties: false
    required:
      - id
      - wbs
      - name
      - duration_days
      - depends_on
      - owner
    properties:
      id:
        $ref: "#/$defs/Id"
      wbs:
        type: string
        minLength: 1
        description: "WBS element ID this task contributes to (e.g., WBS-AUTH-010, WBS-AUTH-API-010)."
        pattern: "^WBS-[A-Z0-9-]+-[0-9]{2,4}$"
      name:
        type: string
        minLength: 1
        description: "Task name."
      duration_days:
        type: number
        exclusiveMinimum: 0
        description: >
          Task duration in working days.
          Fractional values are allowed (e.g., 0.125, 0.25, 0.5, 1.0).
          Use milestones instead of 0-day tasks.
      depends_on:
        $ref: "#/$defs/DependencyIds"
      owner:
        $ref: "#/$defs/Owner"
      tags:
        type: array
        description: "Optional tags for filtering/grouping."
        items:
          type: string
          minLength: 1
        uniqueItems: true
      notes:
        type: string
        description: "Optional free-form notes (keep concise)."

  Milestone:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - depends_on
    properties:
      id:
        $ref: "#/$defs/Id"
      name:
        type: string
        minLength: 1
        description: "Milestone name."
      depends_on:
        $ref: "#/$defs/DependencyIds"
      owner:
        $ref: "#/$defs/Owner"
      date_hint:
        $ref: "#/$defs/Date"
      tags:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      notes:
        type: string
        description: "Optional notes."

  MilestonesLevel:
    type: object
    required:
      - schedule_level
      - milestones
    properties:
      schedule_level:
        const: "milestones"
      milestones:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/Milestone"
    allOf:
      - not:
          required: ["domain"]
      - not:
          required: ["container"]
    $comment: >
      Milestones plan: require milestones.
      Tasks are optional; if used, keep them coarse and treat as summary tasks.
      domain/container must be omitted here.

  DomainLevel:
    type: object
    required:
      - schedule_level
      - domain
      - tasks
    properties:
      schedule_level:
        const: "domain"
      tasks:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/Task"
    allOf:
      - not:
          required: ["container"]
    $comment: >
      Domain summary plan: require domain + tasks.
      container must be omitted here.

  ContainerLevel:
    type: object
    required:
      - schedule_level
      - domain
      - container
      - tasks
    properties:
      schedule_level:
        const: "container"
      tasks:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/Task"
    $comment: >
      Container-level detailed plan: require domain + container + tasks.
