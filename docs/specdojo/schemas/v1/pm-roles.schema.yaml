# pm-roles.schema.yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "SpecDojo Project Role Definition schema"
type: object
$comment: >
  Schema for project role definition files:
  docs/ja/projects/<project_id>/030-project-management/020-organization/pm-roles.yaml
  Defines the adopted roles for a project. Common role definitions and
  responsibilities are governed by people-and-organization-definition-standard.
  Non-adopted roles and owner usage rules are defined in pm-organization.md.

additionalProperties: false

required:
  - version
  - project_id
  - roles

properties:
  version:
    type: integer
    minimum: 1
    description: "Schema/data version."

  project_id:
    type: string
    minLength: 1
    description: "Project identifier (e.g., prj-0001)."

  document:
    type: object
    description: "Optional document metadata (id, type, status, based_on)."
    additionalProperties: true

  roles:
    type: array
    minItems: 1
    description: "List of adopted roles for this project."
    items:
      $ref: "#/$defs/Role"
    uniqueItems: true

$defs:
  Role:
    type: object
    additionalProperties: false
    required:
      - code
      - name
    properties:
      code:
        type: string
        description: "Role code used in WBS / Schedule owner and pm-members.yaml role
          fields."
        enum: [ "PO", "PM", "BA", "ARC", "DEV", "QE", "UX", "OPS" ]

      name:
        type: string
        minLength: 1
        description: "Full name of the role (e.g., Project Owner)."

      project_note:
        type: string
        description: "Optional project-specific note describing how this role is used in
          the project."
