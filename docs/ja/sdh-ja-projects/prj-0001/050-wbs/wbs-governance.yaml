      - path: docs/ja/handbook/samples/prj-overview-sample.md
        kind: modify
      - path: docs/ja/handbook/templates/prj-scope-input-template.md
        kind: modify
      - path: docs/ja/handbook/samples/prj-scope-sample.md
        kind: modify
      - path: docs/ja/handbook/templates/prj-issues-and-approach-input-template.md
        kind: modify
      - path: docs/ja/handbook/samples/prj-issues-and-approach-sample.md
