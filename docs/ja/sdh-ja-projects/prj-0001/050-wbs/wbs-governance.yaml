  - id: WBS-GOV-META-040
    name: メタルールブックガバナンスセットの整備
    description: |
      すべての下流ルールが利用するメタデータ・命名・構造・ テストスコープの共有メタルールセットを整備する。
    owner: ARC
    component: meta
    deliverables:
      - path: docs/ja/handbook/rules/meta-document-metadata-rules.md
        kind: modify
      - path: docs/ja/handbook/rules/meta-id-and-file-naming-rules.md
        kind: modify
      - path: docs/ja/handbook/rules/meta-rulebook-structure-rules.md
        kind: modify
      - path: docs/ja/handbook/rules/meta-test-document-scope-rules.md
        kind: modify
    done_criteria: |
      メタルールセットが、下流のルール・指示が矛盾なく再利用できる 共有メタデータ・命名・構造・テストスコープの制約を定義していること。
