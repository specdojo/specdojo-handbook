      プロジェクト概要、スコープ、課題と解決アプローチのルール・指示ファイルを、 ガバナンス配下の1つのドキュメントファミリーとして整備する（カタログ §2.1–§2.3）。
    owner: PO
    component: project-docs
    deliverables:
      - path: docs/ja/handbook/rules/prj-overview-rules.md
        kind: modify
