# プロジェクトメンバー名簿
# `specdojo exec --by <nickname>` に指定するニックネームと担当者情報を管理します。
# nickname は一度イベントログに記録されると変更不可です（履歴の一貫性）。
# agent メンバーには `persona` / `focus` / `scheduler_strategy` を任意で設定できます。
# 役割別 agent は `owner` を持たせることで、scheduler 実行時の既定挙動を分けられます。
# yaml-language-server: $schema=../../../../../shared/schemas/members.schema.yaml
version: 1
project_id: prj-0001

members:
  - nickname: po
    display_name: Product Owner
    email: null
    owner: PO
    type: human

  - nickname: ba
    display_name: Business Analyst
    email: null
    owner: BA
    type: human

  - nickname: arc
    display_name: Architect
    email: null
    owner: ARC
    type: human

  - nickname: qe
    display_name: Quality Engineer
    email: null
    owner: QE
    type: human

  - nickname: po-agent
    display_name: Product Owner Agent
    email: null
    owner: PO
    type: agent
    persona: value-first
    focus:
      - business_value
      - priority
      - outcome
    scheduler_strategy: critical-first
    note: 価値・優先順位・意思決定の整理を重視する PO 代替エージェント

  - nickname: ba-agent
    display_name: Business Analyst Agent
    email: null
    owner: BA
    type: agent
    persona: analysis-first
    focus:
      - requirements
      - traceability
      - gap-analysis
    scheduler_strategy: fifo
    note: 要件の分解・整合・抜け漏れ確認を重視する BA 代替エージェント

  - nickname: arc-agent
    display_name: Architect Agent
    email: null
    owner: ARC
    type: agent
    persona: structure-first
    focus:
      - architecture
      - consistency
      - constraints
    scheduler_strategy: critical-first
    note: アーキテクチャ整合性と設計制約の確認を重視する ARC 代替エージェント

  - nickname: qe-agent
    display_name: Quality Engineer Agent
    email: null
    owner: QE
    type: agent
    persona: risk-averse
    focus:
      - acceptance
      - regression
      - edge-cases
    scheduler_strategy: critical-first
    note: 受入条件・回帰観点・リスク確認を重視する QE 代替エージェント

  - nickname: copilot
    display_name: GitHub Copilot
    email: null
    owner: null # 汎用エージェント。必要に応じて --owner で役割を指定
    type: agent
    persona: general-purpose
    focus:
      - execution-support
      - documentation
    scheduler_strategy: critical-first
    note: 汎用の実行支援エージェント
