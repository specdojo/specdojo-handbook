kind: schedule
version: 1
project_id: prj-0001
schedule_level: domain
domain: agent-customization
assigned_team: specdojo-handbook
default_agent_mode: agent-ultra
settings:
  finish_milestone_id: M-SDH-AGT-900
  notes: |-
    エージェントカスタマイズドメインスケジュール。
    WBS（instructions / skills / prompts / catalog-integrity）を順次実行し、
    .github 配下成果物と成果物カタログの整合を確定する。
tasks:
  - id: T-SDH-AGT-010
    wbs: WBS-AGT-INS-010
    name: Instructions セットの整備
    duration_days: 0.5
    depends_on:
      - M-SDH-100
    owner: ARC
    tags:
      - agent-customization
      - instructions
    notes: >-
      .github/instructions 配下の運用ルールを整備し、applyTo と運用境界の整合を確認する。
  - id: T-SDH-AGT-020
    wbs: WBS-AGT-SKL-020
    name: Skills セットの整備
    duration_days: 0.5
    depends_on:
      - T-SDH-AGT-010
    owner: ARC
    tags:
      - agent-customization
      - skills
    notes: >-
      単体実行 Skill と全体実行 Skill の責務分割を確認し、参照関係を整合させる。
  - id: T-SDH-AGT-030
    wbs: WBS-AGT-PRM-030
    name: Prompts セットの整備
    duration_days: 0.5
    depends_on:
      - T-SDH-AGT-020
    owner: BA
    tags:
      - agent-customization
      - prompts
    notes: >-
      各 prompt の起動対象 Skill、入力前提、出力形式を点検して一貫性を担保する。
  - id: T-SDH-AGT-040
    wbs: WBS-AGT-INT-040
    name: カタログ整合性の確認
    duration_days: 0.25
    depends_on:
      - T-SDH-AGT-030
    owner: PO
    tags:
      - agent-customization
      - governance
    notes: >-
      成果物カタログの一覧と .github 配下成果物の対応を最終確認し、差分があれば反映する。
milestones:
  - id: M-SDH-AGT-900
    name: エージェントカスタマイズドメイン完了
    depends_on:
      - T-SDH-AGT-040
    owner: PO
