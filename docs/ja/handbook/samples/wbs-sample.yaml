wbs:
  - id: WBS-PDT-BIZDOCS-0010
    name: 販売業務仕様を整理する
    description: 駄菓子屋きぬやの店頭販売業務を、業務プロセス仕様と概念データフロー図で定義する。
    owner: BA
    component: sales
    deliverables:
      - path: docs/ja/sample-gcs-product/010-業務仕様/050-業務プロセス仕様/README.md
        kind: modify
        note: 販売業務の主フローと例外フローを整理する
      - path: docs/ja/sample-gcs-product/010-業務仕様/010-概念データフロー図/cdfd-030-販売概念DFD-AS-IS.md
        kind: modify
        note: 販売時の情報流れを明確化する
    done_criteria: 店頭販売の業務フロー、入出力、例外時対応がレビュー可能な粒度で記述され、図と本文の説明が相互に整合していること。
    acceptance_refs:
      - BAC-SALES-010
    tags:
      - sales
      - business-spec
    notes: レジ会計と在庫引当の境界を曖昧にしない。

  - id: WBS-PDT-SCRDES-0020
    name: 会計画面と商品管理画面の設計をまとめる
    description: 店員が迷わず操作できるよう、会計画面と商品管理画面の実装画面仕様を整える。
    owner: ARC
    component: ui
    deliverables:
      - path: docs/ja/sample-gcs-product/040-システム設計/050-実装画面仕様/サンプル.md
        kind: modify
        note: 会計画面と商品管理画面の入力項目・表示項目を定義する
      - path: docs/ja/sample-gcs-product/040-システム設計/040-エラー処理/サンプル.md
        kind: reference
        note: 画面で扱う入力エラーと業務エラーの方針を参照する
    done_criteria: 画面ごとの入力項目、表示項目、操作結果、主要エラー時の振る舞いが定義され、店員向けの操作想定と整合していること。
    acceptance_refs:
      - SAC-UI-020
      - DEC-0007
    tags:
      - ui
