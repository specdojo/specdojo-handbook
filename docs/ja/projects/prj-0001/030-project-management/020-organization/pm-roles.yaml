roles:
  - code: PO
    name: Project Owner
    project_note: 最終判断を担い、PM・OPS 責務を兼務する。

  - code: BA
    name: Business Analyst
    project_note: 要件、利用者視点、受入条件を整理する。

  - code: ARC
    name: Architect
    project_note: 文書体系、構成方針、技術制約を整理する。

  - code: QE
    name: Quality Engineer
    project_note: 品質基準、レビュー観点、整合性を確認する。
