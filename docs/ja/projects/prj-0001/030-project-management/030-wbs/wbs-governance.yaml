id: wbs-governance
type: wbs
status: draft
project_id: prj-0001
domain: governance
assigned_team: specdojo-handbook
wbs:
  - id: WBS-GOV-PRJ-010
    name: プロジェクトドキュメントのルール・指示セットの整備
    description: |-
      プロジェクト概要、スコープ、課題と解決アプローチのルール・指示ファイルを、 ガバナンス配下の1つのドキュメントファミリーとして整備する（成果物カタログ「プロジェクト関連」）。
      Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
    component: project-docs
    deliverables:
      - id: prj-overview-rulebook
        path: docs/ja/handbook/rulebooks/prj-overview-rulebook.md
      - id: prj-overview-instruction
        path: docs/ja/handbook/instructions/prj-overview-instruction.md
      - id: prj-scope-rulebook
        path: docs/ja/handbook/rulebooks/prj-scope-rulebook.md
      - id: prj-scope-instruction
        path: docs/ja/handbook/instructions/prj-scope-instruction.md
      - id: prj-issues-and-approach-rulebook
        path: docs/ja/handbook/rulebooks/prj-issues-and-approach-rulebook.md
      - id: prj-issues-and-approach-instruction
        path: docs/ja/handbook/instructions/prj-issues-and-approach-instruction.md
      - id: prj-0001-prj-overview
        path: docs/ja/handbook/samples/prj-overview-sample.md
      - id: prj-0001-prj-scope
        path: docs/ja/handbook/samples/prj-scope-sample.md
      - id: prj-issues-and-approach
        path: docs/ja/handbook/samples/prj-issues-and-approach-sample.md
    done_criteria:
      - |-
        プロジェクト概要・スコープ・課題と解決アプローチのルール・指示ペアが、 必須セクション・禁止事項・AI執筆ガイダンスを用語のブレなく定義していること。 Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
  - id: WBS-GOV-MIG-020
    name: 移行ドキュメントファミリーの整備
    description: |-
      移行計画、移行テスト、データ移行、カットオーバー、運用切替の ルール・指示ファイルを1つの移行ファミリーとして整備する（成果物カタログ「移行」）。
      Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
    component: migration
    deliverables:
      - id: mip-index-rules
        path: docs/ja/handbook/rulebooks/mip-index-rulebook.md
      - id: mip-index-instruction
        path: docs/ja/handbook/instructions/mip-index-instruction.md
      - id: mtp-rules
        path: docs/ja/handbook/rulebooks/mtp-rulebook.md
      - id: mtp-instruction
        path: docs/ja/handbook/instructions/mtp-instruction.md
      - id: dmd-rules
        path: docs/ja/handbook/rulebooks/dmd-rulebook.md
      - id: dmd-instruction
        path: docs/ja/handbook/instructions/dmd-instruction.md
      - id: cop-rules
        path: docs/ja/handbook/rulebooks/cop-rulebook.md
      - id: cop-instruction
        path: docs/ja/handbook/instructions/cop-instruction.md
      - id: otp-rules
        path: docs/ja/handbook/rulebooks/otp-rulebook.md
      - id: otp-instruction
        path: docs/ja/handbook/instructions/otp-instruction.md
      - id: mip-index
        path: docs/ja/handbook/samples/mip-index-sample.md
      - id: mtp-sample
        path: docs/ja/handbook/samples/mtp-sample.md
      - id: dmd-order-data
        path: docs/ja/handbook/samples/dmd-sample.md
      - id: cop-cutover-day
        path: docs/ja/handbook/samples/cop-sample.md
      - id: otp-hypercare
        path: docs/ja/handbook/samples/otp-sample.md
    done_criteria:
      - |-
        移行ファミリーのルール・指示ファイルが、インデックス構成・テスト計画・ データ移行設計・カットオーバー基準・運用切替手順を一貫した見出しとAIガイダンスで定義していること。 Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
  - id: WBS-GOV-OPS-030
    name: 運用ドキュメントファミリーの整備
    description: |-
      運用設計・運用手順のルール・指示ファイルを整備する（成果物カタログ「運用設計」）。
      Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
    component: operations
    deliverables:
      - id: opd-rulebook
        path: docs/ja/handbook/rulebooks/opd-rulebook.md
      - id: opd-instruction
        path: docs/ja/handbook/instructions/opd-instruction.md
      - id: opr-rulebook
        path: docs/ja/handbook/rulebooks/opr-rulebook.md
      - id: opr-instruction
        path: docs/ja/handbook/instructions/opr-instruction.md
      - id: opd-index
        path: docs/ja/handbook/samples/opd-sample.md
      - id: opr-index
        path: docs/ja/handbook/samples/opr-sample.md
    done_criteria:
      - |-
        運用設計・運用手順のルール・指示ペアが、SLA・エスカレーション・ 定常運用・インシデント対応のガイダンスを一貫して定義していること。 Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
  - id: WBS-GOV-META-040
    name: メタルールブックガバナンスセットの整備
    description: |-
      すべての下流ルールが利用するメタデータ・命名・構造・ テストスコープの共有メタルールセットを整備する。
      Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
    component: meta
    deliverables:
      - id: meta-document-metadata-rulebook
        path: docs/ja/handbook/rulebooks/meta-document-metadata-rulebook.md
      - id: meta-id-and-file-naming-rulebook
        path: docs/ja/handbook/rulebooks/meta-id-and-file-naming-rulebook.md
      - id: meta-rulebook-structure-rulebook
        path: docs/ja/handbook/rulebooks/meta-rulebook-structure-rulebook.md
      - id: meta-test-document-scope-rulebook
        path: docs/ja/handbook/rulebooks/meta-test-document-scope-rulebook.md
    done_criteria:
      - |-
        メタルールセットが、下流のルール・指示が矛盾なく再利用できる 共有メタデータ・命名・構造・テストスコープの制約を定義していること。 Agent-Ultra前提: 中間承認は省略可能とし、最終承認で rules/instruction/sample を一括で ready 化する。
