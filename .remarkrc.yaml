settings:
  rule: "-"
  ruleRepetition: 3
  ruleSpaces: false

  bullet: "-"

plugins:
  - remark-parse
  - - remark-frontmatter
    - type: yaml
      marker: "-"
  - - remark-gfm
    - tablePipeAlign: false
  - remark-lint
  - - remark-lint-frontmatter-schema
    - schemas:
        ./docs/shared/schemas/spec-frontmatter.schema.yaml:
          - ./docs/**/*.md
