name: Publish specdojo to npm

on:
  push:
    branches:
      - main
    paths:
      - "tools/specdojo/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-specdojo.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-specdojo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p \"require('./tools/specdojo/package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./tools/specdojo/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check published version
        id: version_check
        shell: bash
        run: |
          set -euo pipefail
          package_name='${{ steps.pkg.outputs.name }}'
          package_version='${{ steps.pkg.outputs.version }}'
          published_version="$(npm view "$package_name" version 2>/dev/null || true)"

          echo "published=$published_version" >> "$GITHUB_OUTPUT"

          if [ "$published_version" = "$package_version" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version is already published. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish $package_name@$package_version (current npm version: ${published_version:-<none>})."
          fi

      - name: Build package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm --workspace tools/specdojo run build

      - name: Verify package contents
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm pack --workspace tools/specdojo --dry-run

      - name: Publish to npm via Trusted Publishing
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --workspace tools/specdojo --access public
